<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bootstrap AI Builder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
}

.header{
background:#000;
padding:10px;
border-bottom:2px solid #333;
}

.sidebar{
background:#1b1b1b;
height:100vh;
overflow:auto;
padding:15px;
}

.sidebar button{
width:100%;
margin-bottom:8px;
}

textarea{
width:100%;
height:40vh;
background:#111;
color:#00ff9c;
border:none;
padding:10px;
font-family:monospace;
}

iframe{
background:white;
height:50vh;
border:none;
}

.device button{
margin-right:5px;
}

</style>
</head>

<body>

<div class="header d-flex justify-content-between">

<h5>Builder</h5>

<div>
<button class="btn btn-success" onclick="run()">Run</button>
<button class="btn btn-info" onclick="exportHTML()">Export HTML</button>
<button class="btn btn-warning" onclick="saveProject()">Save</button>
<button class="btn btn-secondary" onclick="importProject()">Import</button>
<button class="btn btn-danger" onclick="resetPage()">Reset</button>
<button class="btn btn-light" onclick="toggleMode()">Dark/Light</button>
</div>

</div>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<h6>Components</h6>

<button class="btn btn-primary" onclick="add('button')">Button</button>
<button class="btn btn-success" onclick="add('card')">Card</button>
<button class="btn btn-warning" onclick="add('alert')">Alert</button>
<button class="btn btn-info" onclick="add('navbar')">Navbar</button>
<button class="btn btn-secondary" onclick="add('form')">Form</button>
<button class="btn btn-dark" onclick="add('grid')">Grid</button>
<button class="btn btn-dark" onclick="add('modal')">Modal</button>
<button class="btn btn-dark" onclick="add('badge')">Badge</button>
<button class="btn btn-dark" onclick="add('spinner')">Spinner</button>
<button class="btn btn-dark" onclick="add('list')">List Group</button>
<button class="btn btn-dark" onclick="add('image')">Image</button>

<hr>

<h6> Generator</h6>

<button class="btn btn-light text-dark" onclick="aiLanding()">Landing Page</button>
<button class="btn btn-light text-dark" onclick="aiPortfolio()">Portfolio</button>
<button class="btn btn-light text-dark" onclick="aiStore()">Store Page</button>
<button class="btn btn-light text-dark" onclick="aiLogin()">Login Form</button>
<button class="btn btn-light text-dark" onclick="aiTopbar()">Top Navbar</button>

</div>

<div class="col-md-10">

<div class="device p-2">

Preview:

<button class="btn btn-outline-light btn-sm" onclick="device('100%')">Desktop</button>
<button class="btn btn-outline-light btn-sm" onclick="device('768px')">Tablet</button>
<button class="btn btn-outline-light btn-sm" onclick="device('375px')">Mobile</button>

</div>

<div class="row">

<div class="col-md-6">

<h6>Code Editor</h6>
<textarea id="code"></textarea>

</div>

<div class="col-md-6">

<h6>Preview</h6>
<iframe id="preview" class="w-100"></iframe>

</div>

</div>

</div>

</div>

</div>

<script>

function add(type){

let code=document.getElementById("code")
let html=""

if(type==="button"){
html=`<button class="btn btn-primary m-2">Button</button>`
}

if(type==="card"){
html=`
<div class="card m-3" style="width:18rem">
<div class="card-body">
<h5 class="card-title">Card</h5>
<p>Example card</p>
<button class="btn btn-primary">Go</button>
</div>
</div>`
}

if(type==="alert"){
html=`<div class="alert alert-success">Alert message</div>`
}

if(type==="navbar"){
html=`
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand">Navbar</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link">Home</a></li>
<li class="nav-item"><a class="nav-link">About</a></li>
</ul>
</div>
</div>
</nav>`
}

if(type==="form"){
html=`
<div class="p-3">
<input class="form-control mb-2" placeholder="Nama">
<input class="form-control mb-2" placeholder="Email">
<button class="btn btn-primary">Submit</button>
</div>`
}

if(type==="grid"){
html=`
<div class="container">
<div class="row">
<div class="col-md-4 bg-primary text-white p-3">Col</div>
<div class="col-md-4 bg-success text-white p-3">Col</div>
<div class="col-md-4 bg-danger text-white p-3">Col</div>
</div>
</div>`
}

if(type==="modal"){
html=`
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">Open Modal</button>

<div class="modal fade" id="myModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Modal</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
Hello modal
</div>

</div>
</div>
</div>`
}

if(type==="badge"){
html=`<h4>Notification <span class="badge bg-danger">4</span></h4>`
}

if(type==="spinner"){
html=`<div class="spinner-border text-primary"></div>`
}

if(type==="list"){
html=`
<ul class="list-group">
<li class="list-group-item">Item 1</li>
<li class="list-group-item">Item 2</li>
<li class="list-group-item">Item 3</li>
</ul>`
}

if(type==="image"){
html=`<img src="https://picsum.photos/600/300" class="img-fluid rounded">`
}

code.value+=html
run()

}

function aiLanding(){
document.getElementById("code").value=`
<div class="container text-center mt-5">
<h1>Welcome</h1>
<p>Landing Page</p>
<button class="btn btn-primary">Get Started</button>
</div>`
run()
}

function aiPortfolio(){
document.getElementById("code").value=`
<div class="container mt-5">
<h1 class="text-center">Portfolio</h1>
<div class="row">
<div class="col-md-4"><div class="card"><div class="card-body">Project</div></div></div>
<div class="col-md-4"><div class="card"><div class="card-body">Project</div></div></div>
</div>
</div>`
run()
}

function aiStore(){
document.getElementById("code").value=`
<div class="container mt-5">
<h1>Store</h1>
<div class="card p-3">
<h5>Product</h5>
<p>$10</p>
<button class="btn btn-success">Buy</button>
</div>
</div>`
run()
}

function aiLogin(){
document.getElementById("code").value=`
<div class="container d-flex justify-content-center align-items-center" style="height:80vh">
<div class="card p-4" style="width:350px">
<h4 class="text-center">Login</h4>
<input class="form-control mb-2" placeholder="Username">
<input type="password" class="form-control mb-3" placeholder="Password">
<button class="btn btn-primary w-100">Login</button>
</div>
</div>`
run()
}

function aiTopbar(){
document.getElementById("code").value=`
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">MySite</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link">Home</a></li>
<li class="nav-item"><a class="nav-link">Contact</a></li>
</ul>
</div>
</div>
</nav>`
run()
}

function run(){

let code=document.getElementById("code").value
let preview=document.getElementById("preview").contentWindow.document

preview.open()

preview.write(`
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"><\/script>
</head>
<body>
${code}
</body>
</html>
`)

preview.close()

}

function exportHTML(){

let code=document.getElementById("code").value

let html=`<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"><\/script>
</head>
<body>
${code}
</body>
</html>`

let blob=new Blob([html],{type:"text/html"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="bootstrap-site.html"
a.click()

}

function saveProject(){

let code=document.getElementById("code").value
let blob=new Blob([code])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="project.txt"
a.click()

}

function importProject(){

let input=document.createElement("input")
input.type="file"

input.onchange=e=>{

let reader=new FileReader()

reader.onload=function(){
document.getElementById("code").value=this.result
run()
}

reader.readAsText(e.target.files[0])

}

input.click()

}

function resetPage(){
document.getElementById("code").value=""
run()
}

function device(size){
document.getElementById("preview").style.width=size
}

function toggleMode(){

let body=document.body

if(body.style.background=="white"){
body.style.background="#0f0f0f"
body.style.color="white"
}else{
body.style.background="white"
body.style.color="black"
}

}

run()

</script>

</body>
</html>
